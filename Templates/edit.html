<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Edit Member</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow-sm mx-auto"
         style="max-width:700px;">

        <div class="card-header">
            <h3>Edit Member</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">
                            First Name
                        </label>

                        <input type="text"
                               name="first_name"
                               value="{{ member.first_name }}"
                               class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">
                            Last Name
                        </label>

                        <input type="text"
                               name="last_name"
                               value="{{ member.last_name }}"
                               class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               value="{{ member.email }}"
                               class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">
                            Status
                        </label>

                        <select name="status"
                                class="form-select">

                            <option {% if member.status == "Active" %}selected{% endif %}>
                                Active
                            </option>

                            <option {% if member.status == "Expiring Soon" %}selected{% endif %}>
                                Expiring Soon
                            </option>

                            <option {% if member.status == "Lapsed" %}selected{% endif %}>
                                Lapsed
                            </option>

                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">
                            Amount Paid
                        </label>

                        <input type="number"
                               step="0.01"
                               name="amount_paid"
                               value="{{ member.amount_paid }}"
                               class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">
                            Last Payment
                        </label>

                        <input type="date"
                               name="last_payment"
                               value="{{ member.last_payment }}"
                               class="form-control">
                    </div>

                </div>

                <div class="mt-4 d-flex justify-content-between">

                    <a href="/"
                       class="btn btn-secondary">
                       Back
                    </a>

                    <button type="submit"
                            class="btn btn-primary">
                            Save Changes
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
