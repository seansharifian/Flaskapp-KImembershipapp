<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4 text-center">
                        Membership Login
                    </h2>

                    <form method="POST">

                        <div class="mb-3">
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Username"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Password"
                                required
                            >
                        </div>

                        <button class="btn btn-primary w-100">
                            Login
                        </button>

                    </form>

                    <div class="mt-3 text-center text-muted">
                        admin / admin123
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
